<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <link rel="manifest" href="/manifest.json" />
    <title>Cyber AI - Secure Access Gateway</title>
    <script>
      // Gracefully capture and suppress benign cross-origin iframe/script errors
      window.addEventListener('error', function(event) {
        if (event.message === 'Script error.' || (event.error && event.error.message && event.error.message.includes('Script error'))) {
          console.warn('Captured and suppressed benign cross-origin script error.');
          event.preventDefault();
          return true;
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
